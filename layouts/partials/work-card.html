<article class="work-card">
  <a class="work-card-link" href="{{ .RelPermalink }}">
    {{ with .Params.cover }}
    <div class="work-cover"><img src="{{ . | relURL }}" alt=""></div>
    {{ end }}
    <div class="work-body">
      <div class="work-heading">
        <h3>{{ .Title }}</h3>
        {{ with .Params.status }}<span class="work-status">{{ . }}</span>{{ end }}
      </div>
      <p>{{ with .Description }}{{ . }}{{ else }}{{ .Summary | plainify | truncate 120 }}{{ end }}</p>
      {{ with .Params.stack }}
      <div class="work-stack">
        {{ range . }}<span>{{ . }}</span>{{ end }}
      </div>
      {{ end }}
    </div>
  </a>
</article>
